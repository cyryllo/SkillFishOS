# us
[timing.intervals]
sample = 500
adjust = 200_000

[gpu-usage]
fix-metrics = true
method = "process" # "busy-flag" or "process"
flush-every = 10

[gpu]
set-method = "kernel"  # "smu" or "kernel"

[dbus]
enabled = false

# MHz/ms
[timing.ramp-rates]
normal = 1
burst = 50

# number of samples
[timing]
burst-samples = 60
down-events = 5

# MHz
[frequency-thresholds]
adjust = 10

# %
[load-target]
upper = 0.80
lower = 0.65

#°C
[temperature]
throttling = 85
throttling_recovery = 75

[[safe-points]]
frequency = 500
voltage = 700

