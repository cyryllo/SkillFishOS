# SkillFishOS APT repository — Portainer stack "skillfishos-repo"
# Serves the reprepro output (/srv/skillfishos-repo) over HTTP on port 80.
# Created inside Portainer (endpointId=1) via the API.
services:
  repo:
    image: nginx:stable
    container_name: skillfishos-repo
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /srv/skillfishos-repo:/usr/share/nginx/html:ro
      - /opt/skillfishos-repo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
