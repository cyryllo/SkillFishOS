server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;
    autoindex on;
    autoindex_exact_size off;
    # reprepro internals must never be web-exposed
    location ~ ^/(conf|db|incoming)(/|$) { deny all; return 404; }
    location / { try_files $uri $uri/ =404; }
}
