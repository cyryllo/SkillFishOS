# SkillFishOS repo server — bootstrap stack (Portainer + Watchtower)
# Deployed directly with `docker compose up -d` on the LXC host (192.168.5.22),
# since Portainer must exist before it can manage other stacks.
# Admin password is read from ./admin_password (NOT committed). Min 12 chars.
services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    command: --admin-password-file /run/portainer_admin_password
    ports:
      - "8000:8000"   # Edge agent tunnel
      - "9443:9443"   # HTTPS UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - /opt/portainer/admin_password:/run/portainer_admin_password:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    # NB: containrrr/watchtower is unmaintained and incompatible with Docker 29
    # (client API 1.25 < min 1.40). Use the maintained fork nickfedor/watchtower.
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=Europe/Rome
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *   # daily 04:00
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  portainer_data:
