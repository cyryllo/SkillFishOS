version: 2
updates:
  # Website (Astro / npm)
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "website"]
    commit-message:
      prefix: "deps(website)"
    groups:
      astro:
        patterns: ["astro", "@astrojs/*"]

  # GitHub Actions used by the CodeQL workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"
