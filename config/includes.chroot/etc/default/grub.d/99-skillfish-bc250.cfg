# SkillFish OS - BC-250 boot parameters
# Baked-in: split_lock_detect=off is already in kernel CONFIG_CMDLINE.
#
# IMPORTANT: Do NOT enable IOMMU - broken on BC-250 (crashes / no display).
#
# Optional performance (uncomment in /etc/default/grub GRUB_CMDLINE_LINUX_DEFAULT):
#   mitigations=off               # +FPS, disables CPU vulnerability mitigations
#   amdgpu.bc250_cc_write_mode=3  # 40-CU unlock (thermal-heavy! cap clocks ~1500MHz/900mV)
