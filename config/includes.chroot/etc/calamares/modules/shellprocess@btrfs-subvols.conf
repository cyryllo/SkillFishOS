---
# Create btrfs subvolumes AFTER partition module, BEFORE mount module.
# Finds the btrfs root partition by scanning block devices.

dontChroot: true
timeout: 30

script:
  - "-": |
      #!/bin/bash
      set -e

      # Find the btrfs partition that was just formatted (newest btrfs by mtime of device)
      ROOT_PART=""
      for DEV in $(lsblk -lnpo NAME,FSTYPE 2>/dev/null | awk '$2=="btrfs"{print $1}'); do
          # Skip any already-subvolume'd btrfs (has subvols from a previous install)
          MNT=$(mktemp -d)
          mount "$DEV" "$MNT" 2>/dev/null || continue
          SUBVOLS=$(btrfs subvolume list "$MNT" 2>/dev/null | wc -l)
          umount "$MNT"
          rmdir "$MNT"
          if [ "$SUBVOLS" -eq 0 ]; then
              ROOT_PART="$DEV"
              break
          fi
      done

      if [ -z "$ROOT_PART" ]; then
          echo "ERROR: No fresh btrfs partition found for subvolume creation."
          echo "       Please ensure you selected btrfs as the filesystem in the partition step."
          exit 1
      fi

      echo "Creating btrfs subvolumes on $ROOT_PART ..."
      MNT=$(mktemp -d)
      mount "$ROOT_PART" "$MNT"

      btrfs subvolume create "$MNT/@"
      btrfs subvolume create "$MNT/@home"
      btrfs subvolume create "$MNT/@snapshots"

      umount "$MNT"
      rmdir "$MNT"
      echo "Subvolumes @, @home, @snapshots created on $ROOT_PART."
