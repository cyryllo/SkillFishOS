---
# Post-install shellprocess: configure snapper for root subvolume

dontChroot: false
timeout: 60

script:
  - "-": |
      #!/bin/bash
      set -e

      # Create snapper config for root
      if command -v snapper &>/dev/null; then
          snapper -c root create-config / 2>/dev/null || true

          # Apply our tuned template
          if [ -f /etc/snapper/config-templates/skillfish-root ]; then
              cp /etc/snapper/config-templates/skillfish-root /etc/snapper/configs/root
          fi

          echo "snapper root config created."
      fi

      # Create initial snapshot of the freshly-installed system
      if command -v snapper &>/dev/null && snapper -c root list &>/dev/null 2>&1; then
          snapper -c root create --description "Initial install — SkillFish OS" 2>/dev/null || true
      fi
