conky.config = {
    alignment = 'top_right',
    gap_x = 16,
    gap_y = 16,
    minimum_width = 240,
    maximum_width = 240,
    own_window = true,
    own_window_type = 'normal',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_class = 'Conky',
    own_window_argb_visual = true,
    own_window_argb_value = 165,
    own_window_colour = '14100a',
    background = true,
    double_buffer = true,
    update_interval = 2,
    cpu_avg_samples = 2,
    use_xft = true,
    xftalpha = 1,
    font = 'DejaVu Sans:size=9',
    default_color = 'D8A849',
    color1 = 'F1E3C6',
    color2 = 'B9A07A',
    draw_shades = false,
    draw_outline = false,
    border_inner_margin = 14,
    border_outer_margin = 0,
};

conky.text = [[
${font DejaVu Sans:bold:size=12}${color D8A849}SkillFish${color1}OS${font}${alignr}${color1}${time %a %d  %H:%M}
${voffset 5}${color2}CPU   ${color1}${freq_g} GHz${color2}    ${color1}${execi 2 skillfish-hud-val cpu_temp}°C${color2}    uso ${color1}${cpu cpu0}%
${voffset 3}${color D8A849}${cpubar cpu1 6,16} ${cpubar cpu2 6,16} ${cpubar cpu3 6,16} ${cpubar cpu4 6,16} ${cpubar cpu5 6,16} ${cpubar cpu6 6,16}
${voffset 2}${color D8A849}${cpubar cpu7 6,16} ${cpubar cpu8 6,16} ${cpubar cpu9 6,16} ${cpubar cpu10 6,16} ${cpubar cpu11 6,16} ${cpubar cpu12 6,16}
${voffset 6}${color2}GPU   ${color1}${execi 2 skillfish-hud-val gpu_freq}${color2}    ${color1}${execi 2 skillfish-hud-val gpu_temp}°C${color2}   Power ${color1}${execi 2 skillfish-hud-val gpu_power} W
${color2}VDDGFX ${color1}${execi 2 skillfish-hud-val gpu_mv} mV
${color2}VRAM  ${color1}${execi 2 skillfish-hud-val vram} MiB
${color2}RAM   ${color1}${mem} / ${memmax}${color2}   ${color1}${memperc}%
${color2}FAN   ${color1}${execi 2 skillfish-hud-val fan} rpm
${color2}DISCO ${color1}${fs_used /} / ${fs_size /}${color2}   ${color1}${fs_used_perc /}%
${voffset 4}${color D8A849}── Bluetooth ──${color}
${execpi 15 skillfish-hud-bt}
]];
